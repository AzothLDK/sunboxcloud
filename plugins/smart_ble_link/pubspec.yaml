name: smart_ble_link
description: A new Flutter plugin for SmartBLELink.
version: 0.0.1
homepage: https://example.com

environment:
  sdk: '>=3.7.2 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.smart_ble_link
        pluginClass: SmartBleLinkPlugin
      ios:
        pluginClass: SmartBleLinkPlugin
